name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: nuget-publish
    permissions:
      id-token: write   # required for NuGet Trusted Publishing OIDC token exchange
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        # SDK version is read from global.json automatically

      - run: dotnet restore

      - run: dotnet build NUnit.Comparisons.slnx --no-restore --configuration Release

      - run: dotnet test NUnit.Comparisons.slnx --no-build --configuration Release

      - run: dotnet pack NUnit.Comparisons.slnx --no-build --configuration Release --output ./nupkg

      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
    
      # Push the package
      - name: NuGet push
        run: dotnet nuget push "./nupkg/*.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate  
        
